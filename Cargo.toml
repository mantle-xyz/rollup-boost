reth-node-ethereum = { path = "/Users/sh002/workspace/reth/crates/ethereum/node" }
reth-optimism-chainspec = { path = "/Users/sh002/workspace/reth/crates/optimism/chainspec" }
reth-optimism-cli = { path = "/Users/sh002/workspace/reth/crates/optimism/cli" }
