[workspace]
resolver = "3"

members = [
    "crates/rollup-boost",
    "crates/websocket-proxy",
    "crates/flashblocks-rpc",
]

[workspace.dependencies]
rollup-boost = { path = "crates/rollup-boost" }

tracing = "0.1.4"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }
clap = { version = "4", features = ["derive", "env"] }
futures = "0.3.31"
thiserror = "2.0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.96"
metrics = "0.24.0"
metrics-derive = "0.1"
tokio = { version = "1", features = ["full"] }
eyre = "0.6.12"
url = "2.2.0"
sha2 = { version = "0.10", default-features = false }
backoff = "0.4.0"

# Reth deps
reth-optimism-payload-builder = { git = "https://github.com/paradigmxyz/reth", tag = "v1.9.3" }

# Alloy libraries
alloy-rpc-types-engine = "1.0.41"
alloy-rpc-types-eth = "1.0.41"
alloy-primitives = { version = "1.4.1", features = ["rand"] }
alloy-serde = "1.0.41"
alloy-eips = "1.0.41"
alloy-json-rpc = "1.0.41"
alloy-consensus = "1.0.41"
alloy-rpc-types = "1.0.41"
alloy-genesis = "1.0.41"
alloy-rpc-client = "1.0.41"
alloy-provider = "1.0.41"
op-alloy-rpc-types = { git = "https://github.com/mantle-xyz/op-alloy", tag = "v2.1.0", default-features = false }
op-alloy-rpc-types-engine = { git = "https://github.com/mantle-xyz/op-alloy", tag = "v2.1.0", default-features = false }
op-alloy-rpc-jsonrpsee = { git = "https://github.com/mantle-xyz/op-alloy", tag = "v2.1.0", default-features = false }
op-alloy-network = { git = "https://github.com/mantle-xyz/op-alloy", tag = "v2.1.0", default-features = false }
op-alloy-consensus = { git = "https://github.com/mantle-xyz/op-alloy", tag = "v2.1.0", default-features = false }
tokio-tungstenite = { version = "0.26.2", features = ["native-tls"] }
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["redis"] }

[patch."https://github.com/paradigmxyz/reth"]
reth = { path = "/Users/sh002/workspace/reth/bin/reth" }
reth-basic-payload-builder = { path = "/Users/sh002/workspace/reth/crates/payload/basic" }
reth-chain-state = { path = "/Users/sh002/workspace/reth/crates/chain-state" }
reth-chainspec = { path = "/Users/sh002/workspace/reth/crates/chainspec" }
reth-cli = { path = "/Users/sh002/workspace/reth/crates/cli/cli" }
reth-cli-commands = { path = "/Users/sh002/workspace/reth/crates/cli/commands" }
reth-cli-util = { path = "/Users/sh002/workspace/reth/crates/cli/util" }
reth-db = { path = "/Users/sh002/workspace/reth/crates/storage/db" }
reth-db-common = { path = "/Users/sh002/workspace/reth/crates/storage/db-common" }
reth-errors = { path = "/Users/sh002/workspace/reth/crates/errors" }
reth-evm = { path = "/Users/sh002/workspace/reth/crates/evm/evm" }
reth-evm-ethereum = { path = "/Users/sh002/workspace/reth/crates/ethereum/evm" }
reth-execution-errors = { path = "/Users/sh002/workspace/reth/crates/evm/execution-errors" }
reth-execution-types = { path = "/Users/sh002/workspace/reth/crates/evm/execution-types" }
reth-exex = { path = "/Users/sh002/workspace/reth/crates/exex/exex" }
